<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷题</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 心情记录首页 -->
    <section id="home" class="screen">
      <h1 class="title">心情日记</h1>
      <p class="subtitle">记录每一天的小情绪 ♡</p>

      <!-- 今日心情选择 -->
      <div class="mood-card">
        <div class="mood-card-title">今天心情如何呀？</div>
        <div class="mood-options" id="mood-options">
          <button class="mood-btn" data-mood="happy">😊<span>开心</span></button>
          <button class="mood-btn" data-mood="love">😍<span>超甜</span></button>
          <button class="mood-btn" data-mood="calm">😌<span>平静</span></button>
          <button class="mood-btn" data-mood="sad">😢<span>难过</span></button>
          <button class="mood-btn" data-mood="angry">😤<span>生气</span></button>
          <button class="mood-btn" data-mood="tired">😴<span>好累</span></button>
          <button class="mood-btn" data-mood="sick">🤒<span>不舒服</span></button>
          <button class="mood-btn" data-mood="thinking">🤔<span>在想</span></button>
        </div>
      </div>

      <!-- 写日记 -->
      <div class="mood-card">
        <div class="mood-card-title">想说点什么？</div>
        <textarea id="mood-text" class="mood-textarea" placeholder="今天发生了什么有趣的事呢..."></textarea>
        <button id="save-mood" class="mood-save-btn">✨ 保存今天的心情</button>
      </div>

      <!-- 历史记录 -->
      <div class="mood-card">
        <div class="mood-card-title">最近的心情 ✿</div>
        <div id="mood-history" class="mood-history">
          <div class="mood-empty">还没有记录哦，快来写下第一条心情吧～</div>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="mood-card">
        <div class="mood-card-title">心情统计 📊</div>
        <div id="mood-stats" class="mood-stats"></div>
      </div>

      <!-- 吃啥入口 -->
      <a href="eat.html" class="eat-entry">
        <div class="eat-card">🍽 吃啥 — 今天吃什么</div>
      </a>
    </section>
  </div>


  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
