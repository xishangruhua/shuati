<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>吃啥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#e2efe5;--bg1:#dcefe2;--bg2:#e6f1e9;--surface:#fff;--fg:#1f2a24;--muted:#8a958e;--line:rgba(60,90,70,.1);--accent:#2f9e6f;--accent-soft:#e3f3ea;--radius:16px}
html,body{min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));background-attachment:fixed;color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.back{position:fixed;top:14px;left:16px;z-index:10;background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:6px 10px;text-decoration:none;font-family:inherit}
.back:hover{color:var(--accent)}
.container{max-width:420px;margin:0 auto;padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center}
.title{font-size:1.8rem;font-weight:700;color:#213027;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:var(--accent);font-size:.9rem;margin-bottom:24px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;width:100%}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface);font-size:.85rem;color:#3a463f;cursor:pointer;transition:all .18s;font-family:inherit}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.box-area{display:flex;gap:12px;justify-content:center;margin-bottom:24px;width:100%}
.box-wrap{position:relative;width:110px;height:130px}
.box-item{width:110px;height:130px;perspective:500px;cursor:pointer;position:relative;z-index:1}
.box-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.2,.7,.3,1);transform-style:preserve-3d}
.box-item.open .box-inner{transform:rotateY(180deg)}

.box-front,.box-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.box-front img{width:100%;height:100%;object-fit:cover}
.box-back{transform:rotateY(180deg);background:var(--surface);border:2px solid var(--accent);flex-direction:column;padding:10px}
.box-back .food-emoji{font-size:2rem;margin-bottom:4px}
.box-back .food-name{font-size:.82rem;font-weight:600;color:#243029;text-align:center;line-height:1.3;word-break:break-all}

/* 隐藏盒子 — 彩色边框 + 呼吸 */
.box-wrap.hidden-box .box-item .box-front{
  border:3px solid transparent;
  animation:rainbowBorder 2s linear infinite;
}
@keyframes rainbowBorder{
  0%{border-color:#ff6b6b}
  16%{border-color:#ffd93d}
  33%{border-color:#6c5ce7}
  50%{border-color:#00d2d3}
  66%{border-color:#ff9ff3}
  83%{border-color:#ff6348}
  100%{border-color:#ff6b6b}
}
/* 隐藏盒子打开后 */
.box-wrap.hidden-box .box-back{border:3px solid transparent;animation:rainbowBorder 2s linear infinite}

/* 隐藏标记小图标 */
.hidden-marker{position:absolute;top:-12px;right:-8px;z-index:5;font-size:1.5rem;animation:floatIcon 1.5s ease-in-out infinite;text-shadow:0 2px 8px rgba(255,170,0,.4)}
@keyframes floatIcon{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.hidden-marker img{width:36px;height:36px;border-radius:50%;box-shadow:0 2px 10px rgba(255,150,0,.4)}

/* 结果 */
.result-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;text-align:center;width:100%;box-shadow:0 2px 8px rgba(30,60,40,.06);min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px}
.result-label{font-size:.85rem;color:var(--muted);margin-bottom:6px}
.result-food{font-size:1.5rem;font-weight:700;color:var(--accent)}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .4s cubic-bezier(.2,.7,.3,1)}

.hidden-result{font-size:1.5rem;font-weight:700;animation:pop .4s cubic-bezier(.2,.7,.3,1);background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6c5ce7,#00d2d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.refresh-btn{padding:12px 36px;border-radius:14px;border:1px solid var(--line);background:var(--surface);font-size:1rem;font-weight:600;color:#2a3530;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(30,60,40,.08);transition:all .18s}
.refresh-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(30,60,40,.12);border-color:rgba(47,158,111,.3)}
.refresh-btn:active{transform:translateY(0)}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(47,158,111,.95);color:#fff;padding:10px 28px;border-radius:12px;font-size:.95rem;font-weight:500;box-shadow:0 4px 20px rgba(47,158,111,.3);opacity:0;transition:opacity .3s,transform .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

var FEEDBACK_TOKEN="c0f2915a5dda41758fa37716b551a4fd";
var HIDDEN_RATE=50;
var cat="all",chosen=[],openedCount=0,hiddenIdx=-1;

function filtered(){return cat==="all"?foods:foods.filter(function(f){return f.c===cat})}
function pick3(){
  var L=filtered();if(L.length<3)return;
  var arr=[],used={};
  while(arr.length<3){
    var i=Math.floor(Math.random()*L.length);
    if(!used[i]){used[i]=1;arr.push(L[i])}
  }
  return arr;
}
function resetBoxes(){
  openedCount=0;chosen=pick3()||[];
  // 1/50 隐藏盒子
  hiddenIdx=(Math.floor(Math.random()*HIDDEN_RATE)===0)?Math.floor(Math.random()*3):-1;
  var wraps=document.querySelectorAll(".box-wrap");
  for(var i=0;i<wraps.length;i++){
    wraps[i].classList.remove("hidden-box");
    wraps[i].querySelector(".box-item").classList.remove("open");
    wraps[i].querySelector(".hidden-marker").style.display="none";
    wraps[i].querySelector(".food-name").textContent=chosen[i]?chosen[i].n:"";
    wraps[i].querySelector(".food-emoji").textContent=emojis[Math.floor(Math.random()*emojis.length)];
    wraps[i].querySelector(".food-name").className="food-name";
  }
  if(hiddenIdx>=0){
    var hw=wraps[hiddenIdx];
    hw.classList.add("hidden-box");
    hw.querySelector(".hidden-marker").style.display="block";
  }
  document.getElementById("result").textContent="选一个盒子吧～";
  document.getElementById("result").className="result-food";
}
function openBox(idx){
  var box=document.querySelectorAll(".box-item")[idx];
  if(box.classList.contains("open"))return;
  box.classList.add("open");
  var isHidden=idx===hiddenIdx;
  var res=document.getElementById("result");
  if(isHidden){
    res.textContent="🧋 请你喝奶茶！";
    res.className="hidden-result";
    pushNotify();
  }else{
    res.textContent=chosen[idx].n;
    res.className="result-food";
    res.classList.remove("pop");void res.offsetWidth;res.classList.add("pop");
  }
}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
async function pushNotify(){
  if(window.location.hostname!=="tmq516.top")return;
  var isSX=false;
  for(var i=0;i<2;i++){
    try{var r=await fetch(["https://api.ip.sb/geoip","https://ipapi.co/json/"][i]);var d=await r.json();if(/山西|shanxi/i.test((d.region||d.regionName||"").toString())){isSX=true;break}}catch(e){}
  }
  if(!isSX)return;
  try{await fetch("https://www.pushplus.plus/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:FEEDBACK_TOKEN,title:"🧋 请你喝奶茶！",content:"有人抽中隐藏彩蛋啦！\n时间:"+new Date().toLocaleString("zh-CN")})})}catch(e){}
}
document.getElementById("boxArea").addEventListener("click",function(e){
  var box=e.target.closest(".box-item");if(!box)return;
  openBox(parseInt(box.parentElement.parentElement.dataset.idx));
});
document.getElementById("refreshBtn").addEventListener("click",resetBoxes);
document.getElementById("filterBar").addEventListener("click",function(e){
  var b=e.target.closest(".filter-btn");if(!b)return;
  cat=b.dataset.cat;
  var all=document.querySelectorAll(".filter-btn");
  for(var i=0;i<all.length;i++)all[i].classList.remove("active");
  b.classList.add("active");
  resetBoxes();
});
