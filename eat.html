<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#e2efe5;--bg1:#dcefe2;--bg2:#e6f1e9;--surface:#fff;--fg:#1f2a24;--muted:#8a958e;--line:rgba(60,90,70,.1);--accent:#2f9e6f;--accent-soft:#e3f3ea;--radius:16px}
html,body{min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));background-attachment:fixed;color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.back{position:fixed;top:14px;left:16px;z-index:10;background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:6px 10px;text-decoration:none;font-family:inherit}
.back:hover{color:var(--accent)}
.container{max-width:420px;margin:0 auto;padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center}
.title{font-size:1.8rem;font-weight:700;color:#213027;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:var(--accent);font-size:.9rem;margin-bottom:24px}

.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;width:100%}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface);font-size:.85rem;color:#3a463f;cursor:pointer;transition:all .18s;font-family:inherit}
.filter-btn:hover{border-color:rgba(47,158,111,.3)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.wheel-box{position:relative;width:300px;height:300px;margin-bottom:28px}
canvas{display:block;border-radius:50%;box-shadow:0 4px 20px rgba(30,60,40,.15),0 0 0 8px var(--surface),0 0 0 10px var(--line)}
.arrow{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:28px solid var(--accent);z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.go-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;z-index:3;box-shadow:0 4px 14px rgba(47,158,111,.35);font-family:inherit;transition:transform .12s}
.go-btn:active{transform:translate(-50%,-50%) scale(.93)}
.go-btn:disabled{opacity:.6;cursor:default}

.result-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;text-align:center;width:100%;box-shadow:0 2px 6px rgba(30,60,40,.05),0 8px 24px rgba(30,60,40,.08);min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-label{font-size:.85rem;color:var(--muted);margin-bottom:8px}
.result-food{font-size:1.6rem;font-weight:700;color:var(--accent)}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .4s cubic-bezier(.2,.7,.3,1)}
</style>
</head>

<a class="back" href="index.html">← 返回</a>

var COLORS=["#e8f5ed","#d4edda","#c3e6cb","#a8e6cf","#b5ead7","#dff0d8","#d6e9c6","#cce5ff","#d1ecf1","#ffeeba","#f8d7da","#f5c6cb","#fce4ec","#f3e5f5","#e8eaf6"];
var cv=document.getElementById("cv"),ctx=cv.getContext("2d"),goBtn=document.getElementById("goBtn"),res=document.getElementById("result");
var cat="all",busy=false,ang=0;

function filtered(){return cat==="all"?foods:foods.filter(function(f){return f.c===cat})}
function draw(){
  var L=filtered(),n=L.length,sa=2*Math.PI/n,cx=150,cy=150,r=146;
  ctx.clearRect(0,0,300,300);
  for(var i=0;i<n;i++){
    var a1=ang+i*sa-Math.PI/2,a2=a1+sa;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a1,a2);ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a1+sa/2);
    ctx.fillStyle="#243029";
    ctx.font=n>40?"9px sans-serif":n>20?"10px sans-serif":"12px sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(L[i].n,r*.72,0);
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,32,0,2*Math.PI);ctx.fillStyle="rgba(255,255,255,.95)";ctx.fill();
}
function spin(){
  if(busy)return;
  var L=filtered();if(!L.length)return;
  busy=true;goBtn.disabled=true;res.textContent="转转转...";
  var n=L.length,sa=360/n,w=Math.floor(Math.random()*n);
  var target=270-(w*sa+sa/2);
  while(target<0)target+=360;
  target+=(Math.random()-.5)*sa*.6;
  var total=360*(5+Math.floor(Math.random()*3))+target;
  var dur=4000+Math.random()*1000,t0=performance.now(),a0=ang;
  function ease(t){return 1-Math.pow(1-t,3)}
  function run(now){
    var t=Math.min((now-t0)/dur,1);
    ang=a0+total*ease(t)*Math.PI/180;
    draw();
    if(t<1){requestAnimationFrame(run)}
    else{ang=ang%(2*Math.PI);busy=false;goBtn.disabled=false;res.textContent="";
      setTimeout(function(){res.textContent=L[w].n;var el=res;el.classList.remove("pop");void el.offsetWidth;el.classList.add("pop")},200)
    }
  }
  requestAnimationFrame(run);
}
goBtn.addEventListener("click",spin);
document.getElementById("filterBar").addEventListener("click",function(e){
  var b=e.target.closest(".filter-btn");if(!b)return;
  cat=b.dataset.cat;
  var all=document.querySelectorAll(".filter-btn");
  for(var i=0;i<all.length;i++)all[i].classList.remove("active");
  b.classList.add("active");
  ang=0;draw();res.textContent="点击转盘开始～";
});
window.addEventListener("resize",function(){if(!busy)draw()});
draw();
