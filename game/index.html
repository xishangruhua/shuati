<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; height: 100dvh;
    background: linear-gradient(160deg, #dcefe2 0%, #e6f1e9 100%);
    background-attachment: fixed;
    color: #1f2a24;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh; padding: 40px 24px;
  }
  .back {
    position: fixed; top: 14px; left: 16px; z-index: 10;
    background: none; border: none; color: #8a958e; font-size: 0.95rem;
    cursor: pointer; padding: 6px 10px; text-decoration: none; font-family: inherit;
  }
  .back:hover { color: #2f9e6f; }
  .line1 {
    font-size: 1.3rem; color: #5a6a5f; margin-bottom: 20px;
    text-align: center; letter-spacing: 0.03em;
  }
  .line2 {
    font-size: 2rem; font-weight: 700; color: #2f9e6f;
    text-align: center; letter-spacing: 0.05em;
  }
  .btn {
    margin-top: 48px; padding: 12px 40px; font-size: 1rem; font-weight: 600;
    border: 1px solid rgba(60,90,70,0.1); border-radius: 16px;
    background: #fff; cursor: pointer; color: #2a3530;
    box-shadow: 0 1px 3px rgba(30,60,40,0.06);
    font-family: inherit; text-decoration: none; display: inline-block;
  }
  .btn:hover { color: #2f9e6f; }
</style>
</head>
<body>
<a class="back" href="../index.html">← 返回</a>
<div class="container">
  <div class="line1">想啥呢，考完试会上架</div>
  <div class="line2">加油加油！</div>
  <a class="btn" href="../index.html">← 返回</a>
</div>
</body>
</html>
