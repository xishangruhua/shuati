<html lang="zh-CN">

<title>吃啥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#e2efe5;--bg1:#dcefe2;--bg2:#e6f1e9;--surface:#fff;--fg:#1f2a24;--muted:#8a958e;--line:rgba(60,90,70,.1);--accent:#2f9e6f;--accent-soft:#e3f3ea;--radius:16px}
html,body{min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));background-attachment:fixed;color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.back{position:fixed;top:14px;left:16px;z-index:10;background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:6px 10px;text-decoration:none;font-family:inherit}
.back:hover{color:var(--accent)}
.container{max-width:420px;margin:0 auto;padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center}
.title{font-size:1.8rem;font-weight:700;color:#213027;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:var(--accent);font-size:.9rem;margin-bottom:24px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;width:100%}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface);font-size:.85rem;color:#3a463f;cursor:pointer;transition:all .18s;font-family:inherit}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.box-area{display:flex;gap:12px;justify-content:center;margin-bottom:24px;width:100%}
.box-wrap{position:relative;width:110px;height:130px}
.box-item{width:110px;height:130px;perspective:500px;cursor:pointer;position:relative;z-index:1}
.box-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.2,.7,.3,1);transform-style:preserve-3d}
.box-item.open .box-inner{transform:rotateY(180deg)}
.box-front,.box-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.box-front img{width:100%;height:100%;object-fit:cover}
.box-back{transform:rotateY(180deg);background:var(--surface);border:2px solid var(--accent);flex-direction:column;padding:10px}
.box-back .food-emoji{font-size:2rem;margin-bottom:6px}
.box-back .food-name{font-size:.82rem;font-weight:600;color:#243029;text-align:center;line-height:1.3}
.box-back img.milk-tea{width:100%;height:100%;object-fit:cover;border-radius:12px}

/* 隐藏盒子 */
.box-wrap.hidden-box .box-front{border:3px solid transparent;animation:rainbowBorder 2s linear infinite}
@keyframes rainbowBorder{
  0%{border-color:#ff6b6b}16%{border-color:#ffd93d}33%{border-color:#6c5ce7}50%{border-color:#00d2d3}66%{border-color:#ff9ff3}83%{border-color:#ff6348}100%{border-color:#ff6b6b}
}
.hidden-marker{position:absolute;top:-12px;right:-8px;z-index:5;animation:floatIcon 1.5s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hidden-marker img{width:36px;height:36px;border-radius:50%;box-shadow:0 2px 10px rgba(255,150,0,.4)}

.result-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;text-align:center;width:100%;box-shadow:0 2px 8px rgba(30,60,40,.06);min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px}
.result-label{font-size:.85rem;color:var(--muted);margin-bottom:6px}
.result-food{font-size:1.5rem;font-weight:700;color:var(--accent)}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.hidden-result{font-size:1.5rem;font-weight:700;animation:pop .4s cubic-bezier(.2,.7,.3,1);background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6c5ce7,#00d2d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.btn-row{display:flex;gap:12px;width:100%;justify-content:center;margin-bottom:20px}
.btn-row button{padding:12px 28px;border-radius:14px;border:1px solid var(--line);background:var(--surface);font-size:1rem;font-weight:600;color:#2a3530;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(30,60,40,.08);transition:all .18s;white-space:nowrap}
.btn-row button:active{transform:translateY(0)}
.btn-row button:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(30,60,40,.12)}
.btn-row button:disabled{opacity:.5;cursor:default;pointer-events:none}

.history-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;width:100%;box-shadow:0 2px 8px rgba(30,60,40,.06)}
.history-title{font-size:.9rem;font-weight:600;color:#3a463f;margin-bottom:10px}
.history-list{display:flex;flex-wrap:wrap;gap:6px}
.history-item{padding:4px 10px;background:var(--accent-soft);border-radius:10px;font-size:.8rem;color:#2f7a4a;font-weight:500}
.history-item.hidden-item{background:linear-gradient(135deg,#ffe0e0,#ffe8c0);color:#c0392b;font-weight:700}
.history-empty{font-size:.82rem;color:var(--muted)}
</style>
</head>

var cat="all", chosen=[], hiddenIdx=-1, history=[];

function filtered(){ return cat==="all"?foods:foods.filter(function(f){return f.c===cat}) }
function pick3(){
  var L=filtered(); if(L.length<3) return [];
  var arr=[], used={};
  while(arr.length<3){ var i=Math.floor(Math.random()*L.length); if(!used[i]){used[i]=1;arr.push(L[i])} }
  return arr;
}

function renderBack(idx){
  var back=document.querySelectorAll(".box-back")[idx];
  if(idx===hiddenIdx){
    // 隐藏：纯🧋 emoji
    back.innerHTML='<div style="font-size:3rem">🧋</div>';
  }else{
    back.innerHTML='<div class="food-emoji">'+(chosen[idx]?chosen[idx].e||"🍽":"")+'</div><div class="food-name">'+(chosen[idx]?chosen[idx].n:"")+'</div>';
  }
}

function resetBoxes(){
  chosen=pick3();
  hiddenIdx=(Math.random()<1/HIDDEN_RATE)?Math.floor(Math.random()*3):-1;
  var wraps=document.querySelectorAll(".box-wrap");
  for(var i=0;i<wraps.length;i++){
    wraps[i].classList.remove("hidden-box");
    wraps[i].querySelector(".box-item").classList.remove("open");
    wraps[i].querySelector(".hidden-marker").style.display="none";
    renderBack(i);
  }
  if(hiddenIdx>=0){
    wraps[hiddenIdx].classList.add("hidden-box");
    wraps[hiddenIdx].querySelector(".hidden-marker").style.display="block";
  }
  var el=document.getElementById("result");
  el.textContent="选一个盒子吧～";
  el.className="result-food";
  document.getElementById("refreshBtn").disabled=false;
}

function addHistory(name, isHidden){
  history.unshift({n:name, hidden:isHidden});
  if(history.length>50)history.pop();
  var h=document.getElementById("historyList");
  var html="";
  for(var i=0;i<history.length;i++){
    html+='<div class="history-item'+(history[i].hidden?' hidden-item':'')+'">'+(history[i].hidden?'🧋 ':'')+history[i].n+'</div>';
  }
  h.innerHTML=html||'<span class="history-empty">暂无记录</span>';
}

var currentResult="";

function openBox(idx){
  var box=document.querySelectorAll(".box-item")[idx];
  if(box.classList.contains("open")) return false;
  box.classList.add("open");
  var isHidden=idx===hiddenIdx;
  if(isHidden){
    currentResult="🧋 请你喝奶茶！";
    document.getElementById("result").textContent=currentResult;
    document.getElementById("result").className="hidden-result";
    addHistory("🧋 请你喝奶茶！", true);
    pushNotify();
  }else{
    currentResult=chosen[idx].n;
    var el=document.getElementById("result");
    el.textContent=currentResult;
    el.className="result-food";
    el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
    addHistory(chosen[idx].n, false);
  }
  return true;
}

async function pushNotify(){
  if(window.location.hostname!=="tmq516.top") return;
  var isSX=false;
  for(var i=0;i<2;i++){try{var r=await fetch(["https://api.ip.sb/geoip","https://ipapi.co/json/"][i]);var d=await r.json();if(/山西|shanxi/i.test((d.region||d.regionName||"").toString())){isSX=true;break}}catch(e){}}
  if(!isSX) return;
  try{await fetch("https://www.pushplus.plus/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:FEEDBACK_TOKEN,title:"🧋 请你喝奶茶！",content:"有人抽中隐藏彩蛋啦！\n时间:"+new Date().toLocaleString("zh-CN")})})}catch(e){}
}

// ====== 自动翻开 ======
var autoTimer=null;

// ====== 事件 ======
document.getElementById("boxArea").addEventListener("click", function(e){
  var box=e.target.closest(".box-item"); if(!box) return;
  openBox(parseInt(box.parentElement.dataset.idx));
});

document.getElementById("refreshBtn").addEventListener("click", resetBoxes);

document.getElementById("filterBar").addEventListener("click", function(e){
  var b=e.target.closest(".filter-btn"); if(!b) return;
  cat=b.dataset.cat;
  var all=document.querySelectorAll(".filter-btn");
  for(var i=0;i<all.length;i++) all[i].classList.remove("active");
  b.classList.add("active");
  resetBoxes();
});

// ====== 启动 ======
resetBoxes();
</script>
