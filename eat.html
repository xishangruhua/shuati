<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>吃啥</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #e2efe5;
    --bg-grad-1: #dcefe2;
    --bg-grad-2: #e6f1e9;
    --surface: #ffffff;
    --surface-soft: #f6faf7;
    --fg: #1f2a24;
    --muted: #8a958e;
    --line: rgba(60, 90, 70, 0.10);
    --accent: #2f9e6f;
    --accent-soft: #e3f3ea;
    --shadow-sm: 0 1px 2px rgba(30,60,40,0.04), 0 1px 3px rgba(30,60,40,0.06);
    --shadow-md: 0 2px 6px rgba(30,60,40,0.05), 0 8px 24px rgba(30,60,40,0.08);
    --shadow-lg: 0 4px 12px rgba(30,60,40,0.06), 0 16px 40px rgba(30,60,40,0.10);
    --radius: 16px;
  }

  html, body {
    height: 100%; height: 100dvh;
    background: linear-gradient(160deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    background-attachment: fixed;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .back {
    position: fixed; top: 14px; left: 16px; z-index: 10;
    background: none; border: none; color: var(--muted);
    font-size: 0.95rem; cursor: pointer; padding: 6px 10px;
    text-decoration: none; display: inline-block; font-family: inherit;
  }
  .back:hover { color: var(--accent); }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 60px 20px 40px;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; min-height: 100dvh;
  }

  .title {
    font-size: 1.8rem; font-weight: 700; color: #213027;
    text-align: center; margin-bottom: 8px;
  }
  .subtitle {
    text-align: center; color: var(--accent); font-size: 0.9rem;
    margin-bottom: 30px;
  }

  /* —— 转盘 —— */
  .wheel-wrap {
    position: relative; width: 300px; height: 300px;
    margin-bottom: 28px;
  }
  .wheel-canvas {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow: 0 4px 20px rgba(30,60,40,0.15), 0 0 0 8px var(--surface), 0 0 0 10px var(--line);
  }
  /* 指针 */
  .wheel-pointer {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    z-index: 2;
  }
  /* 中心按钮 */
  .wheel-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: none; font-size: 1rem; font-weight: 700;
    cursor: pointer; z-index: 3;
    box-shadow: 0 4px 14px rgba(47,158,111,0.35);
    transition: transform .12s;
    font-family: inherit;
  }
  .wheel-center:active { transform: translate(-50%,-50%) scale(0.93); }
  .wheel-center:disabled { opacity: .6; cursor: default; }

  /* —— 结果 —— */
  .result-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 24px;
    text-align: center; width: 100%;
    box-shadow: var(--shadow-md);
    margin-bottom: 20px;
    min-height: 80px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .result-label {
    font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;
  }
  .result-food {
    font-size: 1.6rem; font-weight: 700; color: var(--accent);
    animation: popIn .4s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* —— 筛选按钮 —— */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 20px;
    width: 100%;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--line); background: var(--surface);
    font-size: 0.85rem; color: #3a463f; cursor: pointer;
    transition: all .18s; font-family: inherit;
  }
  .filter-btn:hover { border-color: rgba(47,158,111,0.3); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .hidden { display: none !important; }

  @media (max-width: 380px) {
    .wheel-wrap { width: 260px; height: 260px; }
    .wheel-center { width: 56px; height: 56px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<a class="back" href="index.html">← 返回</a>

<div class="container">
  <h1 class="title">🍽 吃啥</h1>
  <p class="subtitle">农大附近美食转转转</p>

  <!-- 筛选 -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all">全部</button>
    <button class="filter-btn" data-cat="rice">米饭套餐</button>
    <button class="filter-btn" data-cat="noodle">面条/粉</button>
    <button class="filter-btn" data-cat="snack">小吃</button>
    <button class="filter-btn" data-cat="fast">快餐/外卖</button>
    <button class="filter-btn" data-cat="canteen">食堂</button>
    <button class="filter-btn" data-cat="drink">饮品/甜品</button>
  </div>

  <!-- 转盘 -->
  <div class="wheel-wrap">
    <div class="wheel-pointer"></div>
    <canvas class="wheel-canvas" id="wheelCanvas"></canvas>
    <button class="wheel-center" id="spinBtn">转!</button>
  </div>

  <!-- 结果 -->
  <div class="result-card">
    <div class="result-label">今天吃</div>
    <div class="result-food" id="resultFood">点击转盘开始～</div>
  </div>
</div>

  ];

  var COLORS = [
    "#e8f5ed","#d4edda","#c3e6cb","#a8e6cf","#b5ead7",
    "#dff0d8","#d6e9c6","#cce5ff","#d1ecf1","#ffeeba",
    "#f8d7da","#f5c6cb","#fce4ec","#f3e5f5","#e8eaf6"
  ];

  var canvas = document.getElementById("wheelCanvas");
  var ctx = canvas.getContext("2d");
  var spinBtn = document.getElementById("spinBtn");
  var resultEl = document.getElementById("resultFood");
  var currentCat = "all";
  var spinning = false;
  var currentAngle = 0;

  function getFiltered() {
    if (currentCat === "all") return foods;
    return foods.filter(function(f){ return f.c === currentCat; });
  }

  function drawWheel() {
    var dpr = window.devicePixelRatio || 1;
    var size = canvas.parentElement.offsetWidth;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + "px";
    canvas.style.height = size + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var list = getFiltered();
    var n = list.length;
    var cx = size / 2, cy = size / 2, r = size / 2 - 4;
    var sliceAngle = 2 * Math.PI / n;

    ctx.clearRect(0, 0, size, size);

    for (var i = 0; i < n; i++) {
      var startAngle = currentAngle + i * sliceAngle - Math.PI / 2;
      var endAngle = startAngle + sliceAngle;

      // 扇形
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = COLORS[i % COLORS.length];
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 文字
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startAngle + sliceAngle / 2);
      ctx.fillStyle = "#243029";
      ctx.font = n > 40 ? "9px sans-serif" : n > 20 ? "10px sans-serif" : "12px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      var textR = r * 0.72;
      ctx.fillText(list[i].n, textR, 0);
      ctx.restore();
    }

    // 中心圆遮罩
    ctx.beginPath();
    ctx.arc(cx, cy, 32, 0, 2 * Math.PI);
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fill();
  }

  function spin() {
    if (spinning) return;
    var list = getFiltered();
    if (!list.length) return;
    spinning = true;
    spinBtn.disabled = true;
    resultEl.textContent = "转转转...";

    var n = list.length;
    var sliceAngle = 360 / n;
    var winnerIdx = Math.floor(Math.random() * n);
    // 目标角度：让 winnerIdx 对准顶部指针
    // 指针在顶部(12点方向)，第0项从3点方向开始(即90度)
    // 需要让 winnerIdx 的中心对准 270 度(顶部)
    var targetSliceCenter = winnerIdx * sliceAngle + sliceAngle / 2;
    var targetAngle = 270 - targetSliceCenter;
    // 确保正向旋转
    while (targetAngle < 0) targetAngle += 360;
    // 加上随机偏移（在扇形内）
    targetAngle += (Math.random() - 0.5) * sliceAngle * 0.6;
    // 加上几圈
    var totalRotation = 360 * (5 + Math.floor(Math.random() * 3)) + targetAngle;

    var duration = 4000 + Math.random() * 1000;
    var startTime = performance.now();
    var startAngle = currentAngle;

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animate(now) {
      var elapsed = now - startTime;
      var t = Math.min(elapsed / duration, 1);
      var eased = easeOutCubic(t);
      currentAngle = startAngle + (totalRotation * eased) * (Math.PI / 180);
      drawWheel();
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        currentAngle = currentAngle % (2 * Math.PI);
        spinning = false;
        spinBtn.disabled = false;
        resultEl.textContent = "";
        setTimeout(function() {
          resultEl.textContent = list[winnerIdx].n;
        }, 200);
      }
    }
    requestAnimationFrame(animate);
  }

  // 事件
  spinBtn.addEventListener("click", spin);

  document.getElementById("filterBar").addEventListener("click", function(e) {
    var btn = e.target.closest(".filter-btn");
    if (!btn) return;
    currentCat = btn.dataset.cat;
    Array.prototype.forEach.call(document.querySelectorAll(".filter-btn"), function(b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");
    currentAngle = 0;
    drawWheel();
    resultEl.textContent = "点击转盘开始～";
  });

  // 响应式
  window.addEventListener("resize", function() {
    if (!spinning) drawWheel();
  });

  // 初始化
  drawWheel();
})();
</script>
