<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷题</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="home" class="screen">
      <h1 class="title">刷题</h1>
      <p class="subtitle">近代史题库</p>
      <h2 class="section-label">选择复习资料</h2>
      <div id="material-list" class="material-list"></div>
      <div id="eat-entry" class="eat-entry-info"></div>
    </section>

    <!-- 模式选择 -->
    <section id="mode" class="screen hidden">
      <a class="back" href="index.html">← 返回</a>
      <div class="mode-center">
        <h2 id="mode-title" class="mode-title"></h2>
        <p class="mode-cheer" id="mode-cheer">加油呀！祝你稳稳过</p>
        <div id="mode-buttons-box" class="mode-buttons">
          <button class="mode-btn" data-mode="seq">📖 顺序</button>
          <button class="mode-btn" data-mode="shuffle">🔀 打乱</button>
        </div>
        <!-- 顺序设置 -->
        <div id="seq-setup" class="test-setup hidden">
          <div class="slider-double">
            <label class="slider-label">从第 <span id="seq-from-val">1</span> 题</label>
            <input type="range" id="seq-from" min="1" max="100" value="1" step="1">
          </div>
          <div class="slider-double">
            <label class="slider-label">到第 <span id="seq-to-val">50</span> 题</label>
            <input type="range" id="seq-to" min="1" max="100" value="50" step="1">
          </div>
          <div class="total-hint">共 <span id="seq-total">0</span> 题</div>
          <button id="start-seq" class="primary-btn">开始做题</button>
        </div>
        <!-- 打乱设置 -->
        <div id="shuffle-setup" class="test-setup hidden">
          <label class="slider-label">随机题数：<span id="shuffle-val">20</span> 题 <span class="total-hint">/ 共 <span id="shuffle-total">0</span> 题</span></label>
          <input type="range" id="shuffle-count" min="5" max="100" value="20" step="1">
          <div class="total-hint" id="shuffle-ratio"></div>
          <button id="start-shuffle" class="primary-btn">开始做题</button>
        </div>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="quiz" class="screen hidden">
      <div class="quiz-top">
        <a class="back" href="index.html">← 返回</a>
        <span id="quiz-progress" class="quiz-progress"></span>
        <span id="quiz-score" class="quiz-score"></span>
      </div>

      <!-- 选择题/判断题 布局 -->
      <div id="quiz-choice" class="quiz-body">
        <div id="locate-hint" class="locate-hint"></div>
        <div id="question-stem" class="question-stem"></div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <div id="explanation" class="explanation"></div>
      </div>

      <div class="quiz-nav">
        <button id="prev-btn" class="nav-btn">← 上一道</button>
        <button id="submit-btn" class="primary-btn hidden">提交</button>
        <button id="next-btn" class="nav-btn">下一道 →</button>
      </div>
    </section>

    <!-- 测试结果页 -->
    <section id="result" class="screen hidden">
      <h2 class="section-label">测试结束</h2>
      <div id="result-score" class="result-score"></div>
      <div id="result-detail" class="result-detail"></div>
      <div class="mode-buttons">
        <a class="primary-btn" href="index.html">回首页</a>
      </div>
    </section>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
