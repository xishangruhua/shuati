<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#e2efe5;--bg1:#dcefe2;--bg2:#e6f1e9;--surface:#fff;--fg:#1f2a24;--muted:#8a958e;--line:rgba(60,90,70,.1);--accent:#2f9e6f;--accent-soft:#e3f3ea;--radius:16px}
html,body{min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));background-attachment:fixed;color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.back{position:fixed;top:14px;left:16px;z-index:10;background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:6px 10px;text-decoration:none;font-family:inherit}
.back:hover{color:var(--accent)}
.container{max-width:420px;margin:0 auto;padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center}
.title{font-size:1.8rem;font-weight:700;color:#213027;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:var(--accent);font-size:.9rem;margin-bottom:30px}

.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;width:100%}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface);font-size:.85rem;color:#3a463f;cursor:pointer;transition:all .18s;font-family:inherit}
.filter-btn:hover{border-color:rgba(47,158,111,.3)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.box-area{display:flex;gap:16px;justify-content:center;margin-bottom:24px;width:100%}
.box-item{width:100px;height:120px;perspective:400px;cursor:pointer}
.box-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.box-item.open .box-inner{transform:rotateY(180deg)}
.box-front,.box-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(30,60,40,.12)}
.box-front{background:linear-gradient(135deg,var(--accent),#1a7a4f);color:#fff}
.box-front .q{font-size:2.8rem;font-weight:700}
.box-front .hint{font-size:.7rem;opacity:.7;margin-top:4px}
.box-back{background:var(--surface);border:2px solid var(--accent);transform:rotateY(180deg);padding:8px}
.box-back .emoji{font-size:2rem;margin-bottom:4px}
.box-back .food-name{font-size:.82rem;font-weight:600;color:#243029;text-align:center;line-height:1.3}

.result-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;text-align:center;width:100%;box-shadow:0 2px 6px rgba(30,60,40,.05),0 8px 24px rgba(30,60,40,.08);min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px}
.result-label{font-size:.85rem;color:var(--muted);margin-bottom:6px}
.result-food{font-size:1.5rem;font-weight:700;color:var(--accent)}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .4s cubic-bezier(.2,.7,.3,1)}

.refresh-btn{padding:12px 36px;border-radius:14px;border:1px solid var(--line);background:var(--surface);font-size:1rem;font-weight:600;color:#2a3530;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(30,60,40,.08);transition:all .18s}
.refresh-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(30,60,40,.12);border-color:rgba(47,158,111,.3)}
.refresh-btn:active{transform:translateY(0)}

.box-item.disabled{pointer-events:none;opacity:.5}
</style>
</head>

var emojis=["🍗","🍖","🥩","🍔","🍕","🌮","🍜","🥘","🍲","🍱","🥡","🥗","🍰","🧋","☕","🥤","🍦","🍩"];
var cat="all",chosen=[],opened=false;

function filtered(){return cat==="all"?foods:foods.filter(function(f){return f.c===cat})}
function pick3(){
  var L=filtered();if(L.length<3)return;
  var arr=[],used={};
  while(arr.length<3){
    var i=Math.floor(Math.random()*L.length);
    if(!used[i]){used[i]=1;arr.push(L[i])}
  }
  return arr;
}
function resetBoxes(){
  opened=false;chosen=pick3()||[];
  var boxes=document.querySelectorAll(".box-item");
  for(var i=0;i<boxes.length;i++){
    boxes[i].classList.remove("open","disabled");
    boxes[i].querySelector(".emoji").textContent=emojis[Math.floor(Math.random()*emojis.length)];
    boxes[i].querySelector(".food-name").textContent=chosen[i]?chosen[i].n:"";
  }
  document.getElementById("result").textContent="选一个盒子吧～";
}
function openBox(idx){
  var box=document.querySelectorAll(".box-item")[idx];
  if(box.classList.contains("open"))return;
  box.classList.add("open");
  var res=document.getElementById("result");
  res.textContent=chosen[idx].n;
  res.classList.remove("pop");void res.offsetWidth;res.classList.add("pop");
}
document.getElementById("boxArea").addEventListener("click",function(e){
  var box=e.target.closest(".box-item");
  if(!box)return;
  openBox(parseInt(box.dataset.idx))
});
document.getElementById("refreshBtn").addEventListener("click",resetBoxes);
document.getElementById("filterBar").addEventListener("click",function(e){
  var b=e.target.closest(".filter-btn");if(!b)return;
  cat=b.dataset.cat;
  var all=document.querySelectorAll(".filter-btn");
  for(var i=0;i<all.length;i++)all[i].classList.remove("active");
  b.classList.add("active");
  resetBoxes();
});
resetBoxes();
